<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نقطة تفتيش | بحث اللوحات</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0B0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="بحث اللوحات">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14;
    --panel:#141A21;
    --panel-2:#1B232C;
    --line:#26313B;
    --text:#E8ECEF;
    --muted:#7C8792;
    --danger:#E2432B;
    --danger-glow:rgba(226,67,43,0.18);
    --safe:#2BD9A0;
    --safe-glow:rgba(43,217,160,0.14);
    --plate-a:#D8DCE1;
    --plate-b:#9AA0A6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
  body{
    font-family:'Tajawal', sans-serif;
    display:flex; justify-content:center;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 50% 0%, #1a2129 0%, #0B0F14 55%);
  }

  .phone{
    width:100%; max-width:420px; min-height:100vh;
    background:var(--bg);
    display:flex; flex-direction:column;
    position:relative;
    border-inline: 1px solid #000;
  }

  /* Header */
  .topbar{
    padding:22px 20px 16px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #10161C 0%, #0B0F14 100%);
    position:sticky; top:0; z-index:10;
  }
  .topbar .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px; letter-spacing:2px;
    color:var(--muted); text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--safe); box-shadow:0 0 8px var(--safe);}
  .topbar h1{
    font-family:'Cairo', sans-serif; font-weight:900;
    font-size:22px; margin:6px 0 0; color:var(--text);
  }
  .topbar .sub{ color:var(--muted); font-size:13px; margin-top:2px;}

  /* Search row */
  .search-wrap{ padding:16px 20px 6px; }
  .search-box{
    display:flex; align-items:center; gap:10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 10px 8px 14px;
  }
  .search-box input{
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:'JetBrains Mono', monospace;
    font-size:15px; direction:rtl;
  }
  .search-box input::placeholder{ color:var(--muted); font-family:'Tajawal', sans-serif;}

  .mic-btn{
    width:44px; height:44px; border-radius:50%;
    border:1px solid var(--line);
    background:var(--panel-2);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
    transition: box-shadow .2s, background .2s, transform .1s;
  }
  .mic-btn:active{ transform:scale(0.94); }
  .mic-btn svg{ width:20px; height:20px; stroke:var(--muted); transition: stroke .2s;}
  .mic-btn.listening{
    background: var(--danger);
    box-shadow:0 0 0 0 var(--danger-glow);
    animation: pulse 1.3s infinite;
  }
  .mic-btn.listening svg{ stroke:#fff; }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 var(--danger-glow); }
    70%{ box-shadow:0 0 0 16px rgba(226,67,43,0); }
    100%{ box-shadow:0 0 0 0 rgba(226,67,43,0); }
  }

  .mic-status{
    text-align:center; font-size:12px; color:var(--muted);
    height:18px; margin-top:8px; font-family:'JetBrains Mono', monospace;
  }
  .mic-status.active{ color:var(--danger); }

  /* Alert banner */
  #banner{
    margin:10px 20px 0; border-radius:14px;
    padding:14px 16px; display:none;
    align-items:center; gap:12px;
    border:1px solid var(--line);
    animation: slideIn .25s ease-out;
  }
  #banner.show{ display:flex; }
  #banner.wanted{ background:var(--danger-glow); border-color:var(--danger); }
  #banner.clear{ background:var(--safe-glow); border-color:var(--safe); }
  #banner .icon{
    width:38px; height:38px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  #banner.wanted .icon{ background:var(--danger); }
  #banner.clear .icon{ background:var(--safe); }
  #banner .txt b{ display:block; font-family:'Cairo', sans-serif; font-weight:800; font-size:15px; }
  #banner.wanted .txt b{ color:var(--danger); }
  #banner.clear .txt b{ color:var(--safe); }
  #banner .txt span{ color:var(--muted); font-size:12.5px; }
  @keyframes slideIn{ from{ opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }

  /* List */
  .list{ padding:16px 20px 100px; display:flex; flex-direction:column; gap:12px; }
  .count-row{
    display:flex; justify-content:space-between; align-items:center;
    color:var(--muted); font-size:12px; font-family:'JetBrains Mono', monospace;
    margin-bottom:2px;
  }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:14px; display:flex; align-items:center; gap:14px;
    position:relative; overflow:hidden;
    transition: border-color .2s, transform .15s;
  }
  .card.wanted{ border-color:rgba(226,67,43,0.5); }
  .card.dim{ opacity:0.35; transform:scale(0.98); }
  .card.hit{ border-color:var(--danger); box-shadow:0 0 0 1px var(--danger); }
  .card.hit.clear-hit{ border-color:var(--safe); box-shadow:0 0 0 1px var(--safe); }

  .plate{
    flex-shrink:0; width:96px; height:52px; border-radius:6px;
    background:linear-gradient(180deg, var(--plate-a), var(--plate-b));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border:2px solid #6b7075;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 6px rgba(0,0,0,0.4);
  }
  .plate .num{
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:15px;
    color:#141821; letter-spacing:1px; direction:rtl;
  }
  .plate .country{
    font-size:8px; color:#3c4147; letter-spacing:2px; margin-top:2px; font-family:'Tajawal';
  }

  .info{ flex:1; min-width:0; }
  .info .model{ font-family:'Cairo', sans-serif; font-weight:800; font-size:14.5px; color:var(--text); }
  .info .owner{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .badge{
    display:inline-flex; align-items:center; gap:5px;
    margin-top:7px; font-size:11px; padding:3px 9px; border-radius:20px;
    font-family:'Cairo'; font-weight:700;
  }
  .badge.wanted{ background:var(--danger-glow); color:var(--danger); }
  .badge.clear{ background:var(--safe-glow); color:var(--safe); }
  .badge .dot{ width:5px; height:5px; border-radius:50%; background:currentColor; }

  .empty{
    text-align:center; color:var(--muted); padding:60px 20px; font-size:13.5px;
  }

  .hint{
    position:sticky; bottom:0; padding:12px 20px 18px;
    background:linear-gradient(0deg, var(--bg) 60%, transparent);
    text-align:center; font-size:11px; color:var(--muted);
    font-family:'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="topbar">
    <div class="eyebrow"><span class="dot"></span> نظام مراقبة اللوحات — مباشر</div>
    <h1>بحث اللوحات المعدنية</h1>
    <div class="sub">اضغط على المايك وقول رقم اللوحة، أو اكتبه يدويًا</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="مثال: أ ب د ١٢٣٤ ..." dir="rtl" autocomplete="off">
      <div class="mic-btn" id="micBtn" title="بحث صوتي">
        <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </div>
    </div>
    <div class="mic-status" id="micStatus">اضغط للبحث الصوتي</div>
  </div>

  <div id="banner">
    <div class="icon" id="bannerIcon">!</div>
    <div class="txt" id="bannerTxt"><b>—</b><span>—</span></div>
  </div>

  <div class="list">
    <div class="count-row">
      <span id="countLabel">عرض كل السيارات</span>
      <span id="totalLabel"></span>
    </div>
    <div id="cardsWrap"></div>
  </div>

  <div class="hint">قاعدة بيانات تجريبية للعرض التوضيحي فقط</div>
</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>

<script>
const cars = [
  { plate:"أ ب د ١٢٣٤", model:"تويوتا كورولا 2021", owner:"محمد سامي عبد الله", wanted:false },
  { plate:"س ل م ٧٧٧٠", model:"هيونداي إلنترا 2019", owner:"غير مسجل", wanted:true, reason:"مطلوب على ذمة قضية مرورية" },
  { plate:"ر ط ن ٤٥٦١", model:"نيسان صني 2018", owner:"أحمد فتحي", wanted:false },
  { plate:"ط س ب ٩٩١٢", model:"شيفروليه أفيو 2020", owner:"غير مسجل", wanted:true, reason:"إبلاغ سرقة" },
  { plate:"ك م ن ٣٣٢١", model:"كيا سيراتو 2022", owner:"ياسمين طارق", wanted:false },
  { plate:"ع ف ق ٦٦٠٥", model:"هوندا سيفيك 2017", owner:"غير مسجل", wanted:true, reason:"مخالفات متراكمة" },
  { plate:"ج د هـ ١٠٥٥", model:"سكودا أوكتافيا 2020", owner:"كريم منصور", wanted:false },
  { plate:"و ز ح ٨٨٤٤", model:"بيجو 301 2019", owner:"سارة عادل", wanted:false },
];

const cardsWrap = document.getElementById('cardsWrap');
const searchInput = document.getElementById('searchInput');
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const banner = document.getElementById('banner');
const bannerIcon = document.getElementById('bannerIcon');
const bannerTxt = document.getElementById('bannerTxt');
const countLabel = document.getElementById('countLabel');
const totalLabel = document.getElementById('totalLabel');

totalLabel.textContent = cars.length + ' سيارة مسجّلة';

function normalize(str){
  return (str||'')
    .replace(/[\u064B-\u0652]/g,'')
    .replace(/[إأآا]/g,'ا')
    .replace(/ى/g,'ي')
    .replace(/ة/g,'ه')
    .replace(/[٠١٢٣٤٥٦٧٨٩]/g, d => "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)])
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}

function renderCards(matchQuery){
  cardsWrap.innerHTML = '';
  const q = matchQuery ? normalize(matchQuery) : '';
  let anyExactHit = null;

  cars.forEach(car => {
    const nPlate = normalize(car.plate);
    const isMatch = q && nPlate.includes(q.replace(/\s/g,'')) || (q && nPlate.replace(/\s/g,'').includes(q.replace(/\s/g,'')));
    if(isMatch && !anyExactHit) anyExactHit = car;

    const card = document.createElement('div');
    card.className = 'card' + (car.wanted ? ' wanted' : '') + (q && !isMatch ? ' dim' : '') + (isMatch ? (car.wanted ? ' hit' : ' hit clear-hit') : '');

    card.innerHTML = `
      <div class="plate">
        <div class="num">${car.plate}</div>
        <div class="country">مصر</div>
      </div>
      <div class="info">
        <div class="model">${car.model}</div>
        <div class="owner">${car.owner}</div>
        <span class="badge ${car.wanted ? 'wanted' : 'clear'}">
          <span class="dot"></span>${car.wanted ? 'مطلوبة' : 'غير مطلوبة'}
        </span>
      </div>
    `;
    cardsWrap.appendChild(card);
  });

  if(q){
    countLabel.textContent = anyExactHit ? 'تم العثور على تطابق' : 'لا توجد نتائج مطابقة';
    if(anyExactHit){
      banner.classList.add('show');
      if(anyExactHit.wanted){
        banner.className = 'show wanted';
        bannerIcon.textContent = '⚠';
        bannerTxt.innerHTML = `<b>تنبيه: هذه اللوحة مطلوبة</b><span>${anyExactHit.reason || 'راجع الجهة المختصة'}</span>`;
      } else {
        banner.className = 'show clear';
        bannerIcon.textContent = '✓';
        bannerTxt.innerHTML = `<b>اللوحة غير مطلوبة</b><span>${anyExactHit.model} — ${anyExactHit.owner}</span>`;
      }
    } else {
      banner.className = '';
    }
  } else {
    countLabel.textContent = 'عرض كل السيارات';
    banner.className = '';
  }
}

renderCards('');

searchInput.addEventListener('input', e => renderCards(e.target.value));

// Voice search
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'ar-EG';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add('listening');
    micStatus.textContent = '🎙 بيسمع دلوقتي... اتكلم';
    micStatus.classList.add('active');
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    searchInput.value = transcript;
    renderCards(transcript);
    micStatus.textContent = 'تم التقاط: ' + transcript;
  };

  recognition.onerror = (event) => {
    const reasons = {
      'not-allowed': 'الإذن مرفوض — لازم تسمح للمتصفح باستخدام الميكروفون من الإعدادات',
      'service-not-allowed': 'المتصفح رافض الخدمة — جرب تفتح الصفحة عبر رابط https وليس ملف على الجهاز',
      'no-speech': 'ملقتش صوت، جرب تاني وقرّب من الميكروفون',
      'audio-capture': 'مفيش ميكروفون متاح على الجهاز ده',
      'network': 'مشكلة في الاتصال بالإنترنت أثناء التعرف على الصوت',
    };
    micStatus.textContent = reasons[event.error] || ('خطأ: ' + event.error);
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
    micStatus.classList.remove('active');
    if(!searchInput.value) micStatus.textContent = 'اضغط للبحث الصوتي';
  };

  micBtn.addEventListener('click', () => {
    if(listening){ recognition.stop(); return; }
    try{ recognition.start(); } catch(e){}
  });
} else {
  micStatus.textContent = 'البحث الصوتي غير مدعوم في هذا المتصفح';
  micBtn.style.opacity = '0.4';
  micBtn.style.cursor = 'not-allowed';
}
</script>

</body>
</html>
